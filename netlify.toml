[build]
  command = "pnpm run build:netlify"
  publish = "dist/public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  BASE_PATH = "/"
  PORT = "3000"
  NODE_ENV = "production"

[context.production.environment]
  NODE_ENV = "production"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["sharp", "pg-native", "heic-convert"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
